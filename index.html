<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Joueur 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #fbbf24; margin-bottom: 30px; }
        .player { background: #1e293b; border-radius: 12px; padding: 16px; margin: 16px 0; display: flex; align-items: center; gap: 16px; }
        .player img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #fbbf24; }
        .info { flex: 1; }
        .info h3 { margin: 0 0 8px 0; }
        .votes { font-size: 24px; font-weight: bold; color: #fbbf24; }
        button { background: #fbbf24; color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #f59e0b; }
        .total { background: #dc2626; padding: 12px; border-radius: 8px; text-align: center; margin: 20px 0; font-weight: bold; }
        .prix { background: #ea580c; padding: 12px; border-radius: 8px; text-align: center; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 MEILLEUR JOUEUR DU MONDE 2026 🏆</h1>
        <div class="total" id="status">Chargement...</div>
        <div class="prix">💰 1 VOTE = 100 FCFA | Ex: 500 votes = 50 000 FCFA</div>
        <div id="players"></div>
        <div class="total">Total des votes : <span id="totalVotes">0</span></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
        import { getFirestore, collection, doc, onSnapshot, updateDoc, increment, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'

        // 🔥 ZONE 1 : REMPLACE TOUT CE BLOC PAR TA CONFIG FIREBASE 🔥
        const firebaseConfig = {
            apiKey: "COLLE_TON_API_KEY_ICI",
            authDomain: "COLLE_TON_AUTH_DOMAIN_ICI",
            projectId: "COLLE_TON_PROJECT_ID_ICI",
            storageBucket: "COLLE_TON_STORAGE_BUCKET_ICI",
            messagingSenderId: "COLLE_TON_MESSAGING_SENDER_ID_ICI",
            appId: "COLLE_TON_APP_ID_ICI"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 📸 ZONE 2 : REMPLACE LES NOMS + PHOTOS ICI 📸
        const joueurs = [
            { id: "joueur1", nom: "Joueur 1", photo: "https://via.placeholder.com/80/fbbf24/0f172a?text=J1" },
            { id: "joueur2", nom: "Joueur 2", photo: "https://via.placeholder.com/80/fbbf24/0f172a?text=J2" },
            { id: "joueur3", nom: "Joueur 3", photo: "https://via.placeholder.com/80/fbbf24/0f172a?text=J3" }
        ];

        const playersDiv = document.getElementById('players');
        const statusDiv = document.getElementById('status');
        const totalVotesSpan = document.getElementById('totalVotes');
        const dejaVote = localStorage.getItem('aVote2026');

        function render(joueursData) {
            playersDiv.innerHTML = '';
            let total = 0;
            joueursData.forEach(j => {
                total += j.votes || 0;
                const div = document.createElement('div');
                div.className = 'player';
                div.innerHTML = `
                    <img src="${j.photo}" alt="${j.nom}">
                    <div class="info">
                        <h3>${j.nom}</h3>
                        <div class="votes">${j.votes || 0} votes</div>
                    </div>
                    <button onclick="voter('${j.id}')" ${dejaVote ? 'disabled' : ''}>
                        ${dejaVote ? 'Déjà voté' : 'Voter'}
                    </button>
                `;
                playersDiv.appendChild(div);
            });
            totalVotesSpan.textContent = total;
            statusDiv.textContent = 'Vote en cours';
            statusDiv.style.background = '#16a34a';
        }

        onSnapshot(collection(db, 'votes'), (snapshot) => {
            const data = joueurs.map(j => {
                const docSnap = snapshot.docs.find(d => d.id === j.id);
                return { ...j, votes: docSnap ? docSnap.data().votes : 0 };
            });
            render(data);
        }, (error) => {
            statusDiv.textContent = 'Erreur Firebase : Vérifie ta config';
            statusDiv.style.background = '#dc2626';
        });

        window.voter = async (joueurId) => {
            if (localStorage.getItem('aVote2026')) return;
            const ref = doc(db, 'votes', joueurId);
            try {
                await updateDoc(ref, { votes: increment(1) });
            } catch {
                await setDoc(ref, { votes: 1 });
            }
            localStorage.setItem('aVote2026', 'true');
        };
    </script>
</body>
</html>
